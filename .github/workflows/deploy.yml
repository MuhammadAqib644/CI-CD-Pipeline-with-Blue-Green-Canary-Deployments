name: Build and Deploy

on:
  push:
    branches: [ "main" ]
    paths:
      - "app/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-north-1
  EKS_CLUSTER_NAME: bluegreen-canary-demo
  ECR_REPOSITORY: bluegreen-canary-demo
  K8S_NAMESPACE: default
  ROLLOUT_NAME: myapp

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker build -t "$IMAGE_URI" -t "$ECR_REGISTRY/$ECR_REPOSITORY:latest" ./app
          docker push "$IMAGE_URI"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Update kubeconfig and verify EKS access
        run: |
          aws eks update-kubeconfig --name "$EKS_CLUSTER_NAME" --region "$AWS_REGION"
          echo "KUBECONFIG=/home/runner/.kube/config" >> "$GITHUB_ENV"
          # Verify with explicit kubeconfig path
          kubectl get nodes --kubeconfig /home/runner/.kube/config

      - name: Trigger rollout with new image
        env:
          IMAGE_URI: ${{ steps.build.outputs.image_uri }}
        run: |
          kubectl patch rollout "$ROLLOUT_NAME" -n "$K8S_NAMESPACE" \
          --type merge \
          -p '{"spec":{"template":{"spec":{"containers":[{"name":"myapp","image":"'"$IMAGE_URI"'"}]}}}}'


      - name: Show rollout status
        run: |
          kubectl get rollout "$ROLLOUT_NAME" -n "$K8S_NAMESPACE" -o wide --kubeconfig /home/runner/.kube/config