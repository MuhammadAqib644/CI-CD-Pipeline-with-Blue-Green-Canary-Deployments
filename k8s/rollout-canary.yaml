apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: myapp
spec:
  replicas: 5
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
        - name: myapp
          image: 712685115205.dkr.ecr.eu-north-1.amazonaws.com/bluegreen-canary-demo:latest   # GitHub Actions updates this on every push
          ports:
            - containerPort: 3000
          env:
            - name: APP_VERSION
              value: "v1"
            - name: APP_COLOR
              value: "blue"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
  strategy:
    canary:
      canaryService: myapp-canary   # points only at canary pods (used for analysis)
      stableService: myapp-stable   # points only at stable pods
      steps:
        - setWeight: 20
        - pause: { duration: 30s }
        - analysis:
            templates:
              - templateName: healthcheck
            args:
              - name: service-name
                value: myapp-canary.default.svc.cluster.local
        - setWeight: 50
        - pause: { duration: 30s }
        - setWeight: 80
        - pause: { duration: 30s }
        - setWeight: 100
